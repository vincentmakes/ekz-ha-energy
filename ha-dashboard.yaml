title: EKZ Energy
views:
  - title: Energy
    path: ekz-energy
    icon: mdi:lightning-bolt
    type: sections
    max_columns: 2
    sections:
      - type: grid
        column_span: 1
        cards:
          - type: heading
            heading: Today
          - type: tile
            entity: sensor.ekz_energy_monitor_daily_total_consumption
            name: Consumption
            icon: mdi:lightning-bolt
            color: blue
          - type: tile
            entity: sensor.ekz_energy_monitor_daily_peak_consumption
            name: Peak (HT)
            icon: mdi:sun-clock
            color: orange
          - type: tile
            entity: sensor.ekz_energy_monitor_daily_off_peak_consumption
            name: Off-Peak (NT)
            icon: mdi:moon-waning-crescent
            color: indigo
      - type: grid
        column_span: 1
        cards:
          - type: heading
            heading: Cumulative
          - type: tile
            entity: sensor.ekz_energy_monitor_month_to_date_total
            name: This Month
            icon: mdi:calendar-month
            color: blue
          - type: tile
            entity: sensor.ekz_energy_monitor_year_to_date_total
            name: This Year
            icon: mdi:chart-timeline-variant
            color: blue
          - type: tile
            entity: sensor.ekz_energy_monitor_data_date
            name: Data Date
            icon: mdi:calendar-check
            color: grey
      - title: ''
        type: grid
        column_span: 2
        cards:
          - type: custom:apexcharts-card
            section_mode: true
            graph_span: 1h
            header:
              title: 'Monthly Consumption: Year over Year'
              show: true
            apex_config:
              chart:
                height: 300px
                type: bar
              xaxis:
                type: category
                labels:
                  style:
                    fontSize: 12px
              yaxis:
                - title:
                    text: kWh
                  min: 0
              legend:
                show: true
                position: top
                formatter: |
                  EVAL:function(val) { return val; }
              plotOptions:
                bar:
                  columnWidth: 70%
                  borderRadius: 4
              dataLabels:
                enabled: true
                style:
                  fontSize: 10px
                  fontWeight: 600
                formatter: |
                  EVAL:function(val) { return val > 0 ? Math.round(val) : ''; }
              tooltip:
                'y':
                  formatter: >
                    EVAL:function(val) { return val ? val.toFixed(1) + ' kWh' :
                    '0 kWh'; }
              grid:
                borderColor: var(--divider-color)
                strokeDashArray: 2
            series:
              - entity: sensor.ekz_energy_monitor_monthly_summary
                name: Previous Year
                color: '#666'
                type: column
                data_generator: >
                  const months =
                  ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

                  const vals = entity.attributes.total_prev_year || [];

                  return months.map((m, i) => ({x: m, y: vals[i] || 0}));
              - entity: sensor.ekz_energy_monitor_monthly_summary
                name: Current Year
                color: '#1e88e5'
                type: column
                data_generator: >
                  const months =
                  ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

                  const vals = entity.attributes.total_curr_year || [];

                  return months.map((m, i) => ({x: m, y: vals[i] || 0}));
          - type: custom:apexcharts-card
            section_mode: true
            graph_span: 90d
            header:
              title: Daily Consumption (last 90 days)
              show: true
            apex_config:
              chart:
                height: 300px
                type: bar
                stacked: true
              tooltip:
                x:
                  format: dd MMM yyyy
              xaxis:
                type: datetime
                labels:
                  format: dd MMM
                  style:
                    fontSize: 10px
                  rotate: -45
                  rotateAlways: false
              yaxis:
                - title:
                    text: kWh
                  min: 0
              legend:
                show: true
                position: top
                formatter: |
                  EVAL:function(val) { return val; }
              plotOptions:
                bar:
                  columnWidth: 90%
              grid:
                borderColor: var(--divider-color)
                strokeDashArray: 2
            series:
              - entity: sensor.ekz_energy_monitor_daily_history
                name: HT
                color: '#fb8c00'
                type: column
                data_generator: >
                  const dates = entity.attributes.history_dates || [];

                  const ht = entity.attributes.history_ht || [];

                  return dates.map((d, i) => [new Date(d).getTime(), ht[i] ||
                  0]);
              - entity: sensor.ekz_energy_monitor_daily_history
                name: NT
                color: '#5c6bc0'
                type: column
                data_generator: >
                  const dates = entity.attributes.history_dates || [];

                  const nt = entity.attributes.history_nt || [];

                  return dates.map((d, i) => [new Date(d).getTime(), nt[i] ||
                  0]);
      - title: ''
        type: grid
        column_span: 2
        cards:
          - type: custom:apexcharts-card
            section_mode: true
            header:
              title: Power Profile (2 days)
              show: true
            graph_span: 2d
            apex_config:
              chart:
                height: 300px
              tooltip:
                x:
                  format: dd MMM HH:mm
              xaxis:
                type: datetime
                labels:
                  format: dd MMM HH:mm
                  style:
                    fontSize: 11px
              yaxis:
                - title:
                    text: Watts
                  min: 0
              grid:
                borderColor: var(--divider-color)
                strokeDashArray: 2
            all_series_config:
              type: area
              stroke_width: 2
              opacity: 0.15
              curve: smooth
            series:
              - entity: sensor.ekz_energy_monitor_power_profile
                name: Power (W)
                color: '#1e88e5'
                data_generator: >
                  const dts = entity.attributes.profile_datetimes || [];

                  const watts = entity.attributes.profile_watts || [];

                  return dts.map((d, i) => [new Date(d).getTime(), watts[i] ||
                  0]);
          - type: custom:apexcharts-card
            section_mode: true
            graph_span: 1h
            update_interval: 5min
            header:
              title: Avg Daily Consumption by Month
              show: true
            apex_config:
              chart:
                height: 300px
                type: bar
                animations:
                  enabled: false
              xaxis:
                type: category
                labels:
                  style:
                    fontSize: 11px
                  rotate: -45
              yaxis:
                - title:
                    text: kWh/day
                  min: 0
              legend:
                show: false
              plotOptions:
                bar:
                  columnWidth: 60%
                  borderRadius: 4
              tooltip:
                'y':
                  formatter: >
                    EVAL:function(val) { return val ? val.toFixed(1) + '
                    kWh/day' : ''; }
              grid:
                borderColor: var(--divider-color)
                strokeDashArray: 2
            series:
              - entity: sensor.ekz_energy_monitor_monthly_summary
                name: Avg/day
                color: '#1e88e5'
                type: column
                data_generator: >
                  const labels = entity.attributes.monthly_labels || [];

                  const totals = entity.attributes.monthly_total || [];

                  const monthNames =
                  ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

                  const daysInMonth = [31,28,31,30,31,30,31,31,30,31,30,31];

                  return labels.map((l, i) => {
                    const [y, mo] = l.split('-');
                    const m = parseInt(mo);
                    const days = daysInMonth[m-1] || 30;
                    const avg = totals[i] ? Math.round(totals[i] / days * 10) / 10 : 0;
                    const label = monthNames[m-1] + ' ' + y.slice(2);
                    return {x: label, y: avg};
                  });
      - title: ''
        type: grid
        column_span: 1
        cards:
          - type: custom:apexcharts-card
            section_mode: true
            header:
              title: Today HT/NT Split
              show: true
            graph_span: 24h
            apex_config:
              chart:
                height: 300px
                type: bar
                stacked: true
              tooltip:
                x:
                  format: HH:mm
              xaxis:
                labels:
                  format: HH:mm
                  style:
                    fontSize: 10px
              yaxis:
                - min: 0
              legend:
                show: true
                position: top
                formatter: |
                  EVAL:function(val) { return val; }
              grid:
                borderColor: var(--divider-color)
                strokeDashArray: 2
            series:
              - entity: sensor.ekz_energy_monitor_power_profile
                name: HT
                color: '#fb8c00'
                type: column
                data_generator: >
                  const dts = entity.attributes.profile_datetimes || [];

                  const kwh = entity.attributes.profile_kwh || [];

                  const types = entity.attributes.profile_ht_nt || [];

                  const lastDate = dts.length ? dts[dts.length-1].slice(0,10) : '';

                  const result = [];

                  dts.forEach((d, i) => {
                    if (d.slice(0,10) === lastDate) result.push([new Date(d).getTime(), types[i] === 'HT' ? kwh[i] : 0]);
                  });

                  return result;
              - entity: sensor.ekz_energy_monitor_power_profile
                name: NT
                color: '#5c6bc0'
                type: column
                data_generator: >
                  const dts = entity.attributes.profile_datetimes || [];

                  const kwh = entity.attributes.profile_kwh || [];

                  const types = entity.attributes.profile_ht_nt || [];

                  const lastDate = dts.length ? dts[dts.length-1].slice(0,10) : '';

                  const result = [];

                  dts.forEach((d, i) => {
                    if (d.slice(0,10) === lastDate) result.push([new Date(d).getTime(), types[i] === 'NT' ? kwh[i] : 0]);
                  });

                  return result;
      - title: ''
        type: grid
        column_span: 1
        cards:
          - type: custom:apexcharts-card
            section_mode: true
            header:
              title: Today Cumulative
              show: true
            graph_span: 24h
            apex_config:
              chart:
                height: 300px
              tooltip:
                x:
                  format: HH:mm
              xaxis:
                labels:
                  format: HH:mm
                  style:
                    fontSize: 10px
              yaxis:
                - title:
                    text: kWh
                  min: 0
              grid:
                borderColor: var(--divider-color)
                strokeDashArray: 2
            series:
              - entity: sensor.ekz_energy_monitor_power_profile
                name: kWh
                color: '#43a047'
                type: area
                stroke_width: 2
                opacity: 0.15
                curve: smooth
                data_generator: >
                  const dts = entity.attributes.profile_datetimes || [];

                  const kwh = entity.attributes.profile_kwh || [];

                  const lastDate = dts.length ? dts[dts.length-1].slice(0,10) : '';

                  const result = [];

                  let running = 0;

                  dts.forEach((d, i) => {
                    if (d.slice(0,10) === lastDate) {
                      running += kwh[i] || 0;
                      result.push([new Date(d).getTime(), Math.round(running * 10000) / 10000]);
                    }
                  });

                  return result;
      - title: ''
        type: grid
        column_span: 1
        cards:
          - type: custom:apexcharts-card
            section_mode: true
            chart_type: donut
            header:
              title: 'Year-to-Date: HT vs NT'
              show: true
            apex_config:
              chart:
                height: 300px
              legend:
                show: true
                position: bottom
              plotOptions:
                pie:
                  donut:
                    labels:
                      show: true
                      total:
                        show: true
                        label: Total
                        formatter: >
                          EVAL:function(w) { return
                          Math.round(w.globals.seriesTotals.reduce((a,b) => a+b,
                          0)) + ' kWh'; }
              dataLabels:
                enabled: true
                formatter: |
                  EVAL:function(val) { return Math.round(val) + '%'; }
            series:
              - entity: sensor.ekz_energy_monitor_year_to_date_ht
                name: Peak (HT)
                color: '#fb8c00'
              - entity: sensor.ekz_energy_monitor_year_to_date_nt
                name: Off-Peak (NT)
                color: '#5c6bc0'
      - type: grid
        column_span: 1
        cards:
          - type: heading
            heading: Details
          - type: entities
            show_header_toggle: false
            entities:
              - entity: sensor.ekz_energy_monitor_month_to_date_ht
                name: Month HT
              - entity: sensor.ekz_energy_monitor_month_to_date_nt
                name: Month NT
              - type: divider
              - entity: sensor.ekz_energy_monitor_year_to_date_ht
                name: Year HT
              - entity: sensor.ekz_energy_monitor_year_to_date_nt
                name: Year NT
              - entity: sensor.ekz_energy_monitor_data_date
                name: Data Date
